<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="TCF Okul Spor Cimnastik Yarışma Yönetim Sistemi" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <title>TCF Okul Sporları — Yönetim Sistemi</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Service Worker'ı kaldır — agresif cache real-time için sorun çıkarıyordu
    // Mevcut kullanıcıların kayıtlı SW'leri ilk ziyarette otomatik unregister olur
    // ve cache'leri temizlenir (sw.js içinde self-destruct logic var).
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then((regs) => {
        regs.forEach((reg) => { reg.unregister().catch(() => { /* noop */ }); });
      }).catch(() => { /* noop */ });
      // Tüm cache'leri sil (browser cache API)
      if (window.caches && caches.keys) {
        caches.keys().then((keys) => {
          keys.forEach((k) => caches.delete(k).catch(() => { /* noop */ }));
        }).catch(() => { /* noop */ });
      }
    }
  </script>
</body>

</html>
